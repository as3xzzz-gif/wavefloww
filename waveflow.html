<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>WaveFlow</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="data:application/manifest+json,{
    %22name%22: %22WaveFlow%22,
    %22short_name%22: %22WaveFlow%22,
    %22description%22: %22%D0%9F%D0%BE%D0%B8%D1%81%D0%BA%20%D0%BC%D1%83%D0%B7%D1%8B%D0%BA%D0%B8%20%D0%B8%20%D0%BF%D1%80%D0%BE%D1%81%D0%BB%D1%83%D1%88%D0%B8%D0%B2%D0%B0%D0%BD%D0%B8%D0%B5%20%D1%82%D1%80%D0%B5%D0%BA%D0%BE%D0%B2%22,
    %22theme_color%22: %22%231a1f33%22,
    %22background_color%22: %22%230b0f1c%22,
    %22display%22: %22standalone%22,
    %22orientation%22: %22portrait%22,
    %22scope%22: %22/%22,
    %22start_url%22: %22/%22,
    %22icons%22: [
      {
        %22src%22: %22https://cdn-icons-png.flaticon.com/512/727/727245.png%22,
        %22sizes%22: %22512x512%22,
        %22type%22: %22image/png%22,
        %22purpose%22: %22any%20maskable%22
      }
    ]
  }">
  
  <meta name="theme-color" content="#1a1f33">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WaveFlow">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/727/727245.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #0b0f1c 0%, #1a1f33 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }
    .app-container {
      width: 100%;
      max-width: 1300px;
      background: rgba(18, 25, 45, 0.75);
      backdrop-filter: blur(18px);
      border-radius: 48px;
      padding: 32px 28px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.06);
      animation: floatIn 0.7s ease;
    }
    @keyframes floatIn {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .header {
      margin-bottom: 36px;
      text-align: center;
    }
    .header h1 {
      font-weight: 600;
      font-size: 3rem;
      background: linear-gradient(135deg, #a8d0ff, #6d9eff, #c5b0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header p {
      color: #9eb1dc;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .search-wrapper {
      display: flex;
      background: rgba(10,18,35,0.7);
      border-radius: 100px;
      padding: 4px 4px 4px 24px;
      border: 1px solid rgba(200,220,255,0.15);
      margin-bottom: 30px;
    }
    .search-wrapper:focus-within {
      border-color: #6d9eff;
      box-shadow: 0 0 0 3px rgba(109,158,255,0.2);
    }
    .search-icon {
      color: #7b98d3;
      font-size: 1.4rem;
      margin-right: 12px;
      display: flex;
      align-items: center;
    }
    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 18px 0;
      font-size: 1.2rem;
      color: #fff;
      outline: none;
    }
    .search-input::placeholder {
      color: #7a8bb4;
    }
    .search-btn {
      background: linear-gradient(145deg, #4f6fe0, #2f4bc0);
      border: none;
      border-radius: 60px;
      padding: 14px 36px;
      font-size: 1.1rem;
      font-weight: 500;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.25s;
    }
    .search-btn:hover {
      background: linear-gradient(145deg, #5f7ef0, #3f5bd4);
      transform: scale(1.02);
    }
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .track-card {
      background: rgba(16,24,42,0.7);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 18px;
      border: 1px solid rgba(210,225,255,0.08);
      transition: all 0.3s;
      animation: cardFade 0.5s;
    }
    @keyframes cardFade {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .track-card:hover {
      transform: translateY(-5px);
      border-color: rgba(109,158,255,0.35);
      background: rgba(24,35,58,0.8);
    }
    .artwork-wrapper {
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 15px;
      background: #0e162b;
    }
    .artwork-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }
    .track-card:hover .artwork-img {
      transform: scale(1.05);
    }
    .track-title {
      font-weight: 700;
      font-size: 1.2rem;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-artist {
      color: #b1c7fc;
      font-size: 0.95rem;
      margin-bottom: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .toggle-btn {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 30px;
      padding: 8px;
      font-size: 0.8rem;
      color: #b8ceff;
      cursor: pointer;
      transition: all 0.2s;
    }
    .toggle-btn.active {
      background: #4f6fe0;
      color: white;
    }
    .preview-audio {
      width: 100%;
      height: 32px;
      border-radius: 40px;
      margin-bottom: 10px;
    }
    .youtube-player {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 12px;
      border: none;
      margin-bottom: 10px;
    }
    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .source-link {
      flex: 1 0 calc(50% - 6px);
      background: rgba(255,255,255,0.04);
      border-radius: 40px;
      padding: 8px 6px;
      font-size: 0.75rem;
      color: #d3e2ff;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .source-link:hover {
      background: #3f5bd4;
      color: white;
    }
    .status-message {
      text-align: center;
      padding: 20px;
      color: #b6c8f0;
    }
    .loader {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      border-top-color: #6d9eff;
      animation: spin 0.9s linear infinite;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1><i class="fas fa-wave-square"></i> WaveFlow</h1>
    <p>музыка без границ</p>
  </div>

  <div class="search-wrapper">
    <span class="search-icon"><i class="fas fa-search"></i></span>
    <input type="text" class="search-input" id="searchInput" placeholder="Трек или артист..." value="The Weeknd">
    <button class="search-btn" id="searchBtn"><i class="fas fa-arrow-right"></i> Найти</button>
  </div>

  <div id="statusArea" class="status-message"></div>
  <div id="resultsContainer" class="results-grid"></div>
</div>

<script>
  // Service Worker регистрация
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register("data:application/javascript,self.addEventListener('fetch',e=>e.respondWith(fetch(e.request)))");
  }

  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const resultsDiv = document.getElementById('resultsContainer');
  const statusDiv = document.getElementById('statusArea');

  function setStatus(text, loading = false) {
    statusDiv.innerHTML = loading ? `<span class="loader"></span>${text}` : text;
  }

  async function searchMusic(query) {
    if (!query.trim()) return;
    
    setStatus('Ищем треки...', true);
    resultsDiv.innerHTML = '';
    
    try {
      const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=24`);
      const data = await response.json();
      
      if (data.results.length === 0) {
        setStatus('Ничего не найдено 😔');
        return;
      }
      
      setStatus(`Найдено: ${data.results.length} треков`);
      
      data.results.forEach((track, i) => {
        const card = createCard(track);
        card.style.animationDelay = `${i * 0.02}s`;
        resultsDiv.appendChild(card);
      });
    } catch (error) {
      setStatus('Ошибка! Проверьте интернет 🌐');
    }
  }

  function createCard(track) {
    const card = document.createElement('div');
    card.className = 'track-card';
    
    const artwork = track.artworkUrl100?.replace('100x100', '400x400') || 'https://via.placeholder.com/400/1e2b4a/99b5ff?text=🎵';
    const title = track.trackName || 'Без названия';
    const artist = track.artistName || 'Неизвестен';
    const preview = track.previewUrl;
    
    const query = encodeURIComponent(`${artist} ${title}`);
    
    card.innerHTML = `
      <div class="artwork-wrapper">
        <img class="artwork-img" src="${artwork}" alt="${title}" loading="lazy">
      </div>
      <div class="track-title" title="${title}">${title}</div>
      <div class="track-artist" title="${artist}">${artist}</div>
      
      <div class="player-toggle">
        <button class="toggle-btn active" data-type="preview">🎧 Превью</button>
        <button class="toggle-btn" data-type="full">▶️ Полный</button>
      </div>
      
      <div class="player-container">
        ${preview ? `<audio class="preview-audio" controls src="${preview}"></audio>` : '<p style="color:#8899cc;font-size:0.8rem;padding:5px;">Нет превью</p>'}
        <iframe class="youtube-player" style="display:none" data-src="https://www.youtube.com/embed?listType=search&list=${query}" allowfullscreen></iframe>
      </div>
      
      <div class="sources">
        <a class="source-link" href="${track.trackViewUrl || '#'}" target="_blank"><i class="fab fa-apple"></i> Apple</a>
        <a class="source-link" href="https://open.spotify.com/search/${query}" target="_blank"><i class="fab fa-spotify"></i> Spotify</a>
        <a class="source-link" href="https://music.youtube.com/search?q=${query}" target="_blank"><i class="fab fa-youtube"></i> YouTube</a>
        <a class="source-link" href="https://music.yandex.ru/search?text=${query}" target="_blank"><i class="fab fa-yandex"></i> Яндекс</a>
      </div>
    `;
    
    const previewBtn = card.querySelector('[data-type="preview"]');
    const fullBtn = card.querySelector('[data-type="full"]');
    const audio = card.querySelector('.preview-audio');
    const iframe = card.querySelector('.youtube-player');
    
    previewBtn.addEventListener('click', () => {
      previewBtn.classList.add('active');
      fullBtn.classList.remove('active');
      if (audio) audio.style.display = 'block';
      iframe.style.display = 'none';
      iframe.src = '';
    });
    
    fullBtn.addEventListener('click', () => {
      fullBtn.classList.add('active');
      previewBtn.classList.remove('active');
      if (audio) audio.style.display = 'none';
      iframe.style.display = 'block';
      if (!iframe.src) iframe.src = iframe.dataset.src;
    });
    
    return card;
  }

  searchBtn.addEventListener('click', () => searchMusic(searchInput.value));
  searchInput.addEventListener('keypress', (e) => e.key === 'Enter' && searchMusic(searchInput.value));
  
  searchMusic('The Weeknd');
</script>
</body>
</html>
